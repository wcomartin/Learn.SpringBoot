spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/learn_springboot
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

app:
  jwt:
    secret: change-me-in-production-this-must-be-at-least-32-bytes-long!!
    expiration-ms: 86400000  # 24 hours
